name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
      
      - name: Install dependencies
        run: pip install -r requirements.txt
        
        with:
          python-version: "3.12"
          cache: "pip"

